<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook - Signup</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="assets/CSS/bootstrap.min.css">

    <!-- Bootstrap Icons (IMPORTANT) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Manual CSS -->
    <link rel="stylesheet" href="assets/CSS/style.css">
</head>
<body class="bg-light py-5">

<div class="container d-flex flex-column align-items-center">
    <div class="mb-4 text-center">
        <h1 class="text-primary fw-bold display-4" style="letter-spacing: -2px;">facebook</h1>
    </div>

    <div class="card shadow border-0 rounded-3" style="max-width: 450px; width: 100%;">
        <div class="card-body p-3">
            <div class="text-center mb-3">
                <h2 class="fw-bold fs-3">Create a new account</h2>
                <p class="text-secondary fs-5">It's quick and easy.</p>
            </div>

            <hr class="mb-3">

            <form id="regForm" novalidate>
                <!-- Name Row -->
                <div class="row g-2 mb-3">
                    <div class="col-6 position-relative">
                        <input type="text" id="fName" class="form-control bg-light" placeholder="First name" required>
                        
                        <!-- Tooltip -->
                        <div id="fNameError"
                             class="position-absolute bg-danger text-white p-2 rounded start-0 top-100 mt-2 shadow d-none"
                             style="z-index: 10; width: 100%;">
                            <div class="position-absolute start-0 top-0 translate-middle-y ms-3"
                                 style="border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 10px solid #dc3545;"></div>
                            <small class="fw-bold">What's your name?</small>
                        </div>
                    </div>

                    <div class="col-6">
                        <input type="text" id="lName" class="form-control bg-light" placeholder="Surname" required>
                    </div>
                </div>

                <!-- Date of Birth -->
                <div class="mb-3 position-relative">
                    <div class="d-flex align-items-center mb-1">
                        <span class="small text-secondary me-1">Date of birth</span>
                        <i class="bi bi-question-circle-fill text-secondary"></i>
                    </div>

                    <div class="d-flex gap-2">
                        <select id="day" class="form-select"></select>
                        <select id="month" class="form-select"></select>
                        <select id="year" class="form-select"></select>
                    </div>

                    <i id="dateErrorIcon"
                       class="bi bi-exclamation-circle-fill text-danger position-absolute top-50 end-0 translate-middle-y d-none fs-5"
                       style="margin-top: 10px;"></i>
                </div>

                <!-- Gender -->
                <div class="mb-3 position-relative">
                    <div class="d-flex align-items-center mb-1">
                        <span class="small text-secondary me-1">Gender</span>
                        <i class="bi bi-question-circle-fill text-secondary"></i>
                    </div>

                    <div class="d-flex gap-3">
                        <div class="form-check form-check-inline border rounded px-3 py-1">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>

                        <div class="form-check form-check-inline border rounded px-3 py-1">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                    </div>

                    <i id="genderErrorIcon"
                       class="bi bi-exclamation-circle-fill text-danger position-absolute top-50 end-0 translate-middle-y d-none fs-5"></i>
                </div>

                <!-- Mobile/Email -->
                <div class="mb-3">
                    <input type="text" id="emailPhone" class="form-control bg-light"
                           placeholder="Mobile number or email address" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <input type="password" id="pass" class="form-control bg-light"
                           placeholder="New password" required>
                </div>

                <!-- Submit Button -->
                <div class="text-center">
                    <button type="submit" class="btn btn-success fw-bold px-5 py-2 fs-5 w-50">
                        Sign Up
                    </button>
                    <div class="mt-3">
                        <a href="login.html" class="text-decoration-none">Already have an account?</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="assets/JS/bootstrap.bundle.min.js"></script>
<script src="assets/JS/signUp.js"></script>
</body>
</html>
